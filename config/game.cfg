[game]
title="Solomon's World"
start_lives=3
max_lives=6
time_limit=300
collider_debug=true 	; shows colliders to troubleshoot
scene_intro=true 		; enable scene intro

[sequence]
; Tells the game where to start the very first time

initial_level=99 	; TEST LEVEL

;initial_level=1 	; start
;initial_level=2 	; demonhead	
;initial_level=3 	; Spark I	
;initial_level=8 	; Spark II	
;initial_level=11 	; Spark III


